<div class="min-h-screen bg-[#f8fafc] flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Premium Animated Pastel Mesh Background -->
  <div class="mesh-container">
    <div class="glow-blob blob-indigo"></div>
    <div class="glow-blob blob-purple"></div>
  </div>
  
  <div class="w-full max-w-md premium-glass-card rounded-3xl p-8 border border-slate-200/80 relative overflow-hidden z-10">
    
    <div class="relative z-10">
      <div class="text-center mb-9">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-50 border border-slate-200/60 mb-5 shadow-sm">
          <svg class="w-7 h-7 text-[#6366f1] drop-shadow-[0_0_8px_rgba(99,102,241,0.2)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Welcome back</h1>
        <p class="text-slate-500 text-[15px]">Log in to your Bookly dashboard</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div *ngIf="errorMsg" class="p-3.5 bg-red-50 border border-red-200 rounded-2xl text-red-600 text-[13.5px] leading-relaxed flex gap-2.5 items-start">
          <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          <span>{{ errorMsg }}</span>
        </div>

        <div>
          <label class="block text-[12px] font-bold text-slate-600 mb-2 tracking-wider uppercase">Email Address</label>
          <div class="premium-input-container">
            <svg class="input-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
            <input 
              type="email" 
              formControlName="email"
              class="premium-input"
              placeholder="you@company.com">
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="block text-[12px] font-bold text-slate-600 tracking-wider uppercase">Password</label>
            <a href="#" class="text-[13px] font-semibold text-brand-600 hover:text-brand-700 transition-colors">Forgot password?</a>
          </div>
          <div class="premium-input-container">
            <svg class="input-icon w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input 
              type="password" 
              formControlName="password"
              class="premium-input"
              placeholder="••••••••">
          </div>
        </div>

        <button 
          type="submit"
          [disabled]="loginForm.invalid || isSubmitting"
          class="btn-premium-submit mt-2">
          <span *ngIf="isSubmitting">Signing in...</span>
          <span *ngIf="!isSubmitting">Sign in</span>
        </button>

        <div class="relative flex items-center py-2">
          <div class="flex-grow border-t border-slate-200"></div>
          <span class="flex-shrink-0 mx-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Or continue with</span>
          <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <button 
          type="button"
          (click)="loginWithGoogle()"
          class="btn-oauth-glass">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-slate-500">
        Don't have an account? 
        <a routerLink="/register" class="font-bold text-brand-600 hover:text-brand-700 transition-colors cursor-pointer">Sign up for free</a>
      </p>
    </div>
  </div>
</div>
