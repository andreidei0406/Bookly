<div class="min-h-screen bg-surface-dark bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-darkMuted via-surface-dark to-black flex items-center justify-center p-4">
  
  <div class="w-full max-w-md bg-white/5 backdrop-blur-2xl shadow-glass-lg rounded-3xl p-8 border border-white/10 relative overflow-hidden">
    
    <!-- Decorative glow -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-500 rounded-full mix-blend-screen filter blur-[80px] opacity-50"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-500 rounded-full mix-blend-screen filter blur-[80px] opacity-50"></div>

    <div class="relative z-10">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 border border-white/20 mb-6 shadow-inner">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Create an account</h1>
        <p class="text-gray-400">Start managing your bookings for free</p>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">First name</label>
            <input 
              type="text" 
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-transparent transition-all"
              placeholder="Jane">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Last name</label>
            <input 
              type="text" 
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-transparent transition-all"
              placeholder="Doe">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Email address</label>
          <input 
            type="email" 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-transparent transition-all"
            placeholder="you@company.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input 
            type="password" 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-transparent transition-all"
            placeholder="••••••••">
        </div>

        <button class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3.5 rounded-xl shadow-lg hover:shadow-brand-500/25 transition-all transform hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-brand-500/30">
          Create account
        </button>

        <div class="relative flex items-center py-2">
          <div class="flex-grow border-t border-white/10"></div>
          <span class="flex-shrink-0 mx-4 text-sm text-gray-500">Or continue with</span>
          <div class="flex-grow border-t border-white/10"></div>
        </div>

        <button 
          (click)="loginWithGoogle()"
          class="w-full bg-white/5 hover:bg-white/10 text-white font-medium py-3.5 rounded-xl border border-white/10 flex items-center justify-center gap-3 transition-all focus:outline-none focus:ring-2 focus:ring-white/20">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
      </div>

      <p class="mt-8 text-center text-sm text-gray-400">
        Already have an account? 
        <a routerLink="/login" class="font-medium text-brand-400 hover:text-brand-300 transition-colors cursor-pointer">Sign in</a>
      </p>
    </div>
  </div>
</div>
